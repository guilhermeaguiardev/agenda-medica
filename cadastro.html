<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="form-container">

                <h2 class="text-center">Cadastro</h2>

                <form id="cadastroForm">

                    <label>Nome:</label>
                    <input type="text" id="nome" class="form-control" required>

                    <label class="mt-3">Login:</label>
                    <input type="text" id="login" class="form-control" required>

                    <label class="mt-3">Senha:</label>
                    <input type="password" id="senha" class="form-control" required>

                    <button type="submit" class="btn btn-success w-100 mt-3">
                        Cadastrar
                    </button>

                </form>

                <p class="text-center mt-3">
                    Já tem conta?
                    <a href="login.html">Fazer login</a>
                </p>

            </div>

        </div>

    </div>

</div>

<script>
document.getElementById("cadastroForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nome = document.getElementById("nome").value;
    const login = document.getElementById("login").value;
    const senha = document.getElementById("senha").value;

    try {
        const resposta = await fetch("https://agenda-medica-backend-qfss.onrender.com/cadastro", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ nome, login, senha })
        });

        const dados = await resposta.json();

        if (resposta.ok) {
            alert(dados.mensagem);

            setTimeout(() => {
                window.location.href = "usuarios.html";
            }, 1000);
        } else {
            alert(dados.erro);
        }

        } catch (erro) {
            alert("Erro ao conectar com o servidor");
            console.log(erro);
        }
});
</script>

</body>
</html>
